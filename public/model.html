  :root {
    /* Shared StromaDB design-system tokens — EARTH theme (see wizard.html) */
    --bg:#f2efe6; --bg-2:#eae5d9; --panel:#fffdf7; --panel-2:#f6f1e7;
    --line:#e5dfd1; --line-2:#d4ccba; --fg:#211d15; --fg-dim:#574f40; --mut:#8b8371;
    --accent:#2f9e73; --accent-2:#237a58; --accent-ink:#ffffff;
    --r:10px; --r-sm:7px;
    --shadow:0 1px 0 rgba(0,0,0,.02), 0 14px 30px -16px rgba(60,50,30,.22);
    --bevel:inset 0 1px 0 rgba(255,255,255,.6);
    --panel-grad:linear-gradient(163deg,color-mix(in oklab,var(--panel) 86%,var(--bg-2) 14%),var(--panel));
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,sans-serif;

  html[data-theme="dark"]{

    --line:#2b3437; --line-2:#3a4548; --fg:#e9ede9; --fg-dim:#a9b3ab; --mut:#6f7a72;
    --accent:#40c091; --accent-2:#35a67c; --accent-ink:#eaf6f0;

  }
  html[data-theme="dark"] body{background:
    radial-gradient(1200px 620px at 84% -12%, #17332b 0%, transparent 58%),
    radial-gradient(1000px 560px at -10% 108%, #16272f 0%, transparent 55%),
    radial-gradient(1100px 520px at 50% 118%, #241d13 0%, transparent 62%),
    var(--bg);background-attachment:fixed}
  *{box-sizing:border-box}

    background:

      linear-gradient(180deg, #f5f3ec 0%, transparent 40%),
      radial-gradient(900px 520px at -8% 104%, #dbe8d1 0%, transparent 56%),
      radial-gradient(1300px 560px at 50% 116%, #ebd9b3 0%, transparent 60%),
      var(--bg);
    background-attachment:fixed}
  .wrap{max-width:1400px;margin:0 auto;padding:6px 14px 60px}
  .topbar{view-transition-name:topbar}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,color-mix(in oklab,var(--bg) 90%,transparent),color-mix(in oklab,var(--bg) 62%,transparent));backdrop-filter:blur(11px);border-bottom:1px solid var(--line);margin-bottom:18px}
  .topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:11px;padding:9px 14px;flex-wrap:wrap}
  .mark{display:inline-flex;align-items:center;gap:10px;font-weight:640;letter-spacing:.2px;font-size:16px}
  .mark .dot{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 34% 32%,#3fbfa2 0%,var(--accent) 46%,var(--accent-2) 100%);box-shadow:inset 0 0 0 3px rgba(255,255,255,.55),0 1px 3px rgba(14,110,92,.4)}
  .mark small{font-weight:500;color:var(--mut);font-size:12px}

  .pill.off{color:var(--mut)} .pill.off .dot{background:var(--mut);box-shadow:none}

  .ctl:hover{color:var(--fg);border-color:var(--accent);filter:brightness(1.05)}
  .ctl.select{padding:0}
  .ctl select{appearance:none;background:transparent;border:none;color:inherit;font:inherit;font-size:12.5px;padding:0 10px;height:34px;cursor:pointer}
  .tagline{color:var(--fg-dim);font-size:13.5px;margin:2px 0 18px;max-width:76ch}
  .tagline b{color:var(--fg);font-weight:600}

  .streamhead h2{font-size:15px;margin:0;letter-spacing:-.01em}
  .streamhead .bar{flex:1;height:1px;background:var(--line)}

  .maprow{font-family:var(--mono);font-size:11.5px;color:var(--fg-dim);background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:3px 8px}

  .stab{display:flex;align-items:center;gap:2px;margin-top:10px;flex-wrap:wrap}
  .stab i{width:7px;height:14px;border-radius:2px;background:var(--accent);opacity:.9;flex:none}
  .stab i.wob{background:var(--clay)}
  .stab i.nul{background:var(--line);height:7px}
  .stab .sum{font-size:12px;color:var(--fg-dim);margin-left:7px}
  .stab .wobtxt{font:11.5px var(--mono);color:var(--clay);margin-left:7px}
  .maprow b{color:var(--accent-2)}

  td .pname{font-family:var(--mono);font-size:12.5px;color:var(--accent-2);font-weight:600}
  .cardin{font:600 10px/1 var(--mono);letter-spacing:.04em;padding:3px 8px;border-radius:100px;border:1px solid var(--line);background:var(--panel-2);color:var(--fg-dim)}
  .valrange{color:var(--clay);font-family:var(--mono);font-size:12px}
  .srcmap summary{cursor:pointer;font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:9px;list-style:none}
  .srcmap summary::-webkit-details-marker{display:none}
  .srcmap summary::before{content:"▸";color:var(--mut);font-size:11px;transition:transform .12s}
  .srcmap[open] summary::before{transform:rotate(90deg)}
  .srcmap .mono-tag{font:600 10.5px var(--mono);color:var(--mut);background:var(--panel-2);border:1px solid var(--line);border-radius:100px;padding:3px 9px}
  .srcmap .inner{margin-top:12px;display:flex;flex-direction:column;gap:11px}
  .subh{font:600 10.5px/1 var(--mono);letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin:0 0 7px}
  pre.raw{margin:0;font:11.5px/1.55 var(--mono);color:var(--fg-dim);background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;overflow-x:auto}
  .na{padding:26px 24px;text-align:center}
  .na .glyph{font-size:26px;color:var(--mut);margin-bottom:8px}
  .na h3{margin:0 0 6px;font-size:15.5px}
  .na p{color:var(--fg-dim);font-size:13px;margin:0 auto 16px;max-width:56ch}
  .btn{font:inherit;font-weight:640;font-size:13.5px;border:1px solid transparent;border-radius:var(--r-sm);padding:9px 15px;cursor:pointer;color:var(--accent-ink);background:linear-gradient(180deg,var(--accent),var(--accent-2));box-shadow:inset 0 1px 0 rgba(255,255,255,.3);transition:filter .15s;text-decoration:none;display:inline-block}
  .btn:hover{filter:brightness(1.06)}
  .note{margin-top:16px;padding:11px 13px;background:var(--panel-grad);border:1px solid var(--line);border-radius:var(--r);font-size:12.5px;color:var(--fg-dim);line-height:1.5;box-shadow:var(--bevel),var(--shadow)}
  .note a{color:var(--accent-2);font-weight:600}
  .err{color:var(--bad);font-size:13px;background:color-mix(in oklab,var(--bad) 10%,var(--panel));border:1px solid color-mix(in oklab,var(--bad) 34%,var(--line));border-radius:var(--r-sm);padding:10px 12px;margin:8px 0}
  .err a{color:inherit}
  .loading{color:var(--mut);font-size:13px;padding:8px 0}
  .empty{color:var(--mut);font-size:13px;padding:10px 2px}
  tr.id-dim td{opacity:.45}
  .rowbtn{font:inherit;font-weight:600;font-size:12.5px;border-radius:var(--r-sm);padding:6px 12px;cursor:pointer;border:1px solid transparent;color:var(--accent-ink);background:linear-gradient(180deg,var(--accent),var(--accent-2));box-shadow:inset 0 1px 0 rgba(255,255,255,.3);transition:filter .15s}
  .rowbtn.ghost{color:var(--fg-dim);background:var(--panel-2);border-color:var(--line-2);box-shadow:none}
  .rowbtn:hover{filter:brightness(1.06)}
  .rowbtn[disabled]{opacity:.5;cursor:default}
  .idstate{font:600 11px/1 var(--mono);letter-spacing:.04em;padding:4px 9px;border-radius:100px;border:1px solid var(--line);background:var(--panel-2);color:var(--fg-dim);white-space:nowrap}
  .idstate.ok{color:var(--good);border-color:color-mix(in oklab,var(--good) 36%,var(--line));background:color-mix(in oklab,var(--good) 9%,var(--panel-2))}
  .policycard{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .policycard .q{flex:1;font-weight:600;font-size:13.5px;min-width:220px}
  .cardin.strong{color:var(--accent-2);border-color:color-mix(in oklab,var(--accent) 36%,var(--line));background:color-mix(in oklab,var(--accent) 9%,var(--panel-2))}
  .snip{color:var(--mut);font-size:12.5px}
  .apctx{color:var(--mut);font-size:11.5px;margin-top:3px;line-height:1.45}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);z-index:40;background:var(--panel);color:var(--fg);border:1px solid color-mix(in oklab,var(--good) 36%,var(--line));border-radius:var(--r-sm);padding:10px 16px;font-size:13px;box-shadow:var(--bevel),var(--shadow);opacity:0;transition:opacity .18s,transform .18s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

let LANG = "en";
function t(k, v) {
  let s = (I18N[LANG] && I18N[LANG][k]) || I18N.en[k] || k;
  if (v) for (const [key, val] of Object.entries(v)) s = s.replaceAll("{" + key + "}", String(val));
  return s;
}
function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach((e) => { e.innerHTML = t(e.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-title]").forEach((e) => { e.title = t(e.getAttribute("data-i18n-title")); });
  render();
  renderIdentities();
  renderApprovals();
  renderPatterns();
}

const store = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch {} },
};
let THEME = store.get("vesicle-theme") || "auto";
const media = window.matchMedia("(prefers-color-scheme: dark)");
function resolvedDark() { return THEME === "dark" || (THEME === "auto" && media.matches); }
function applyTheme() {
  document.documentElement.setAttribute("data-theme", resolvedDark() ? "dark" : "light");
  $("#themeBtn").textContent = resolvedDark() ? "☾" : "☀";
}
function setTheme(v) { THEME = v; store.set("vesicle-theme", v); applyTheme(); }
media.addEventListener?.("change", () => { if (THEME === "auto") applyTheme(); });
$("#themeBtn").onclick = () => setTheme(resolvedDark() ? "light" : "dark");
function setLang(l) { LANG = l; store.set("vesicle-lang", l); $("#lang").value = l; applyLang(); }
LANG = store.get("vesicle-lang") || "en";
$("#lang").onchange = (e) => setLang(e.target.value);
$("#logoutBtn").onclick = async () => { await fetch("/api/logout", { method: "POST" }); location.reload(); };

async function refreshStatus() {
  try {
    const s = await fetch("/api/status").then((r) => r.json());
    $("#connPill").classList.toggle("off", !s.stroma);
    $("#connPill").title = `StromaDB · ${s.url}`;
    // reachable → the pill doubles as a link to the engine's own web console
    if (s.stroma && s.url) $("#connPill").href = s.url; else $("#connPill").removeAttribute("href");
    $("#connText").textContent = s.stroma ? "stroma" : "stroma offline";
    if (s.auth && s.user) { $("#userName").textContent = s.user; $("#userPill").hidden = false; }
  } catch {
    $("#connPill").classList.add("off"); $("#connPill").removeAttribute("href"); $("#connText").textContent = "stroma offline";
  }
}

// --- GET /api/model → { model: { types, predicates }, mappings: { sourceId: … } }
// The endpoint lands on another branch — every state below is reachable and rendered:
// loading / not-available (404) / unauthorized (401) / request error / empty model / data.
let STATE = { kind: "loading" };

const name = (x) => typeof x === "string" ? x : (x && typeof x === "object" ? (x.name ?? JSON.stringify(x)) : String(x));

// Sensitivity floor: the minimum access label facts of this predicate get, regardless of how the
// source file was shared. Read-only here; tier names match the connectors' label convention.
const FLOOR_NAMES = { 1: "internal", 2: "confidential", 3: "restricted" };
function floorCell(p) {
  if (p.sensitivity == null) return "—";
  const label = FLOOR_NAMES[p.sensitivity] ?? `label ${p.sensitivity}`;
  return `<span class="cardin" title="${esc(t("floor_hint"))}">${esc(label)}</span>`;
}

function predRow(p) {
  const range = p.range != null
    ? `<span class="etype" style="padding:2px 9px;font-size:11.5px">${esc(name(p.range))}</span>`
    : (p.range_value != null ? `<span class="valrange">${esc(t("value_range", { v: name(p.range_value) }))}</span>` : "—");
  return `<tr>
    <td><span class="pname">${esc(name(p))}</span></td>
    <td>${p.domain != null ? `<span class="etype" style="padding:2px 9px;font-size:11.5px">${esc(name(p.domain))}</span>` : "—"}</td>
    <td>${range}</td>
    <td><span class="cardin">${esc(p.cardinality ?? "—")}</span></td>
    <td>${floorCell(p)}</td>
  </tr>`;
}

function bindingRows(bindings) {
  return bindings.map((b) => {
    const { predicate, source, ...rest } = b ?? {};
    const restStr = Object.keys(rest).length ? JSON.stringify(rest) : "—";
    return `<tr>
      <td><span class="pname">${esc(predicate ?? "—")}</span></td>
      <td class="mono">${esc(source ?? "—")}</td>
      <td class="mono">${esc(restStr)}</td>
    </tr>`;
  }).join("");
}

function sourceMapping(id, m) {
  const parts = [];
  const et = m && typeof m === "object" ? m.entity_types : null;
  if (et && typeof et === "object" && Object.keys(et).length) {
    parts.push(`<div><p class="subh">${t("entity_types_head")}</p><div class="chips">${
      Object.entries(et).map(([k, v]) => `<span class="maprow">${esc(k)} → <b>${esc(name(v))}</b></span>`).join("")
    }</div></div>`);
  }
  const bindings = Array.isArray(m?.bindings) ? m.bindings : null;
  if (bindings && bindings.length) {
    parts.push(`<div><p class="subh">${t("bindings_head")}</p><div class="tablewrap"><table>
      <thead><tr><th>${t("th_binding_pred")}</th><th>${t("th_binding_src")}</th><th>${t("th_binding_rest")}</th></tr></thead>
      <tbody>${bindingRows(bindings)}</tbody></table></div></div>`);
  }
  if (!parts.length) parts.push(`<pre class="raw">${esc(JSON.stringify(m, null, 2))}</pre>`);
  return `<details class="srcmap card" open>
    <summary>${esc(id)} <span class="mono-tag">source</span></summary>
    <div class="inner">${parts.join("")}</div>
  </details>`;
}

function render() {
  const out = $("#out"); if (!out) return;
  if (STATE.kind === "loading") { out.innerHTML = `<div class="loading">${t("loading")}</div>`; return; }
  if (STATE.kind === "unavailable") {
    out.innerHTML = `<div class="card na">
      <div class="glyph">◎</div>
      <h3>${t("na_head")}</h3>
      <p>${t("na_desc")}</p>
      <a class="btn" href="/">${t("open_wizard")}</a>
    </div>`;
    return;
  }
  if (STATE.kind === "unauthorized") { out.innerHTML = `<div class="err">${t("err_unauthorized")}</div>`; return; }
  if (STATE.kind === "error") { out.innerHTML = `<div class="err">${esc(t("err_request", { e: STATE.message }))}</div>`; return; }

  const model = STATE.data.model ?? {};
  const types = Array.isArray(model.types) ? model.types : [];
  const preds = Array.isArray(model.predicates) ? model.predicates : [];
  const mappings = STATE.data.mappings && typeof STATE.data.mappings === "object" ? STATE.data.mappings : {};
  if (!types.length && !preds.length) {
    out.innerHTML = `<div class="card na">
      <div class="glyph">◎</div>
      <p style="margin-bottom:16px">${t("empty_model")}</p>
      <a class="btn" href="/">${t("open_wizard")}</a>
    </div>`;
    return;
  }
  const html = [];
  html.push(`<div class="streamhead" style="margin-top:2px"><h2>${t("types_head")}</h2><div class="bar"></div></div>`);
  html.push(`<div class="card"><div class="chips">${types.map((ty) => `<span class="etype">${esc(name(ty))}</span>`).join("") || `<span class="empty">—</span>`}</div></div>`);
  html.push(`<div class="streamhead"><h2>${t("preds_head")}</h2><div class="bar"></div></div>`);
  html.push(preds.length
    ? `<div class="tablewrap"><table>
        <thead><tr><th>${t("th_name")}</th><th>${t("th_domain")}</th><th>${t("th_range")}</th><th>${t("th_card")}</th><th>${t("th_floor")}</th></tr></thead>
        <tbody>${preds.map(predRow).join("")}</tbody></table></div>`
    : `<div class="empty">—</div>`);
  html.push(`<div class="streamhead"><h2>${t("maps_head")}</h2><div class="bar"></div></div>`);
  const entries = Object.entries(mappings);
  html.push(entries.length ? entries.map(([id, m]) => sourceMapping(id, m)).join("") : `<div class="empty">${t("no_mappings")}</div>`);
  html.push(`<div class="note">${t("readonly_note")}</div>`);
  out.innerHTML = html.join("");
}

// --- Identities: cross-source Person duplicate candidates (GET /api/identities/candidates).
// Rows are pre-sorted by the server: unresolved first (email evidence before name), confirmed next,
// dismissed last (rendered dimmed). Confirm/Dismiss POST /api/identities/resolve, then reload.
// Exact-email pairs carry identical mechanical evidence, so the section leads with ONE policy card
// (POST /api/identities/policy): confirming applies same-as to every open email pair now and keeps
// auto-confirming future ones; revoking stops the auto-confirmation. While no policy is set the
// header's one-shot "confirm all" button (POST /api/identities/confirm-all-email) stays as the
// manual fallback. "Not now" only collapses the card for this page view — nothing is persisted.
// Name-token candidates stay individual.
let IDS = { kind: "loading" };
let POLICY_LATER = false;

let toastTimer = null;
function toast(msg) {
  let el = $("#toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast"; el.className = "toast";
    el.setAttribute("role", "status");
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

function personCell(p) {
  const email = p.email ? ` <span style="color:var(--mut)">(${esc(p.email)})</span>` : "";
  return `${esc(p.name ?? p.id)}${email}`;
}

function idRow(c) {
  const state = c.confirmed ? `<span class="idstate ok">${esc(t("id_confirmed"))}</span>`
    : c.dismissed ? `<span class="idstate">${esc(t("id_dismissed"))}</span>`
    : `<button class="rowbtn" data-act="confirm" data-a="${c.a.id}" data-b="${c.b.id}">${esc(t("id_confirm"))}</button>
       <button class="rowbtn ghost" data-act="dismiss" data-a="${c.a.id}" data-b="${c.b.id}">${esc(t("id_dismiss"))}</button>`;
  return `<tr${c.dismissed ? ' class="id-dim"' : ""}>
    <td>${personCell(c.a)} <span style="color:var(--mut)">↔</span> ${personCell(c.b)}</td>
    <td><span class="cardin">${esc(t(c.evidence === "email" ? "ev_email" : "ev_name"))}</span></td>
    <td style="white-space:nowrap">${state}</td>
  </tr>`;
}

function policyCard() {
  const p = IDS.kind === "data" && IDS.policy ? IDS.policy.emailExact : null;
  if (!p) return "";
  if (p.active) return `<div class="card policycard"><span class="q">${esc(t("id_policy_active"))}</span>
    <button class="rowbtn ghost" data-act="policy-revoke">${esc(t("id_policy_revoke"))}</button></div>`;
  if (!p.openCount || POLICY_LATER) return "";
  return `<div class="card policycard"><span class="q">${esc(t("id_policy_q", { n: p.openCount }))}</span>
    <button class="rowbtn" data-act="policy-confirm">${esc(t("id_policy_confirm"))}</button>
    <button class="rowbtn ghost" data-act="policy-later">${esc(t("id_policy_later"))}</button></div>`;
}

function renderIdentities() {
  const el = $("#identities"); if (!el) return;
  const policyActive = IDS.kind === "data" && IDS.policy && IDS.policy.emailExact.active;
  const nBulk = IDS.kind === "data" && !policyActive
    ? IDS.candidates.filter((c) => c.evidence === "email" && !c.confirmed && !c.dismissed).length : 0;
  const bulkBtn = nBulk
    ? `<button class="rowbtn" data-act="confirm-all-email">${esc(t("id_confirm_all", { n: nBulk }))}</button>` : "";
  const head = `<div class="streamhead"><h2>${t("identities_head")}</h2><div class="bar"></div>${bulkBtn}</div>
    <p class="tagline" style="margin:0 0 12px">${esc(t("id_tagline"))}</p>`;
  if (IDS.kind === "loading") { el.innerHTML = head + `<div class="loading">${t("loading")}</div>`; return; }
  if (IDS.kind === "offline") { el.innerHTML = head + `<div class="empty">${esc(t("id_offline"))}</div>`; return; }
  if (IDS.kind === "unauthorized") { el.innerHTML = head + `<div class="err">${t("err_unauthorized")}</div>`; return; }
  if (IDS.kind === "error") { el.innerHTML = head + `<div class="err">${esc(t("err_request", { e: IDS.message }))}</div>`; return; }
  el.innerHTML = head + policyCard() + (IDS.candidates.length
    ? `<div class="tablewrap"><table>
        <thead><tr><th>${t("th_pair")}</th><th>${t("th_evidence")}</th><th>${t("th_state")}</th></tr></thead>
        <tbody>${IDS.candidates.map(idRow).join("")}</tbody></table></div>`
    : `<div class="empty">${esc(t("id_empty"))}</div>`);
}

async function loadIdentities() {
  try {
    const r = await fetch("/api/identities/candidates");
    if (r.status === 503) { IDS = { kind: "offline" }; renderIdentities(); return; }
    if (r.status === 401) { IDS = { kind: "unauthorized" }; renderIdentities(); return; }
    const j = await r.json().catch(() => null);
    if (!r.ok || !j) { IDS = { kind: "error", message: (j && j.error) || `HTTP ${r.status}` }; renderIdentities(); return; }
    IDS = { kind: "data", candidates: Array.isArray(j.candidates) ? j.candidates : [],
      policy: j.policy && j.policy.emailExact ? j.policy : null };
  } catch (e) {
    IDS = { kind: "error", message: e.message };
  }
  renderIdentities();
}

// Confirm/Dismiss/Confirm-all (event delegation): the reviewer defaults to the signed-in user
// shown in the topbar, else "reviewer" — no prompt, the verdict itself is the interaction.
$("#identities").addEventListener("click", async (ev) => {
  const btn = ev.target.closest("button[data-act]");
  if (!btn) return;
  if (btn.dataset.act === "policy-later") { POLICY_LATER = true; renderIdentities(); return; }
  btn.disabled = true;
  const reviewer = $("#userPill").hidden ? "reviewer" : ($("#userName").textContent || "reviewer");
  try {
    if (btn.dataset.act === "policy-confirm" || btn.dataset.act === "policy-revoke") {
      const action = btn.dataset.act === "policy-confirm" ? "confirm" : "revoke";
      const r = await fetch("/api/identities/policy", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ evidenceClass: "email-exact", action, reviewer }),
      });
      const j = await r.json().catch(() => null);
      if (!r.ok || !j) throw new Error((j && j.error) || `HTTP ${r.status}`);
      toast(action === "confirm" ? t("id_policy_done", { n: j.confirmed }) : t("id_policy_revoked"));
    } else if (btn.dataset.act === "confirm-all-email") {
      const r = await fetch("/api/identities/confirm-all-email", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ reviewer }),
      });
      const j = await r.json().catch(() => null);
      if (!r.ok || !j) throw new Error((j && j.error) || `HTTP ${r.status}`);
      toast(t("id_bulk_done", { n: j.confirmed }));
    } else {
      const r = await fetch("/api/identities/resolve", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ a: Number(btn.dataset.a), b: Number(btn.dataset.b), decision: btn.dataset.act, reviewer }),
      });
      if (!r.ok) {
        const j = await r.json().catch(() => null);
        throw new Error((j && j.error) || `HTTP ${r.status}`);
      }
    }
  } catch (e) {
    IDS = { kind: "error", message: e.message };
    renderIdentities();
    return;
  }
  await loadIdentities();
});

// --- Approvals: deterministic approval candidates from comment text (GET /api/approvals/candidates).
// Rows are pre-sorted by the server: pending first (formal evidence before euphemism, newest comment
// first), confirmed next, dismissed last (rendered dimmed). Confirm/Dismiss POST
// /api/approvals/resolve, then reload.
let APS = { kind: "loading" };

const clip = (s, n) => (s.length > n ? s.slice(0, n - 1) + "…" : s);

// The approver-context line: what the graph already knows about the person — activity counts and
// confirmed linked accounts. Absent values are simply not shown; the reviewer weighs what is there.
function apCtx(c) {
  const x = c.approverContext;
  if (!x) return "";
  const parts = [];
  if (x.comments) parts.push(t("ap_ctx_comments", { n: x.comments }));
  if (x.issuesAssigned) parts.push(t("ap_ctx_assigned", { n: x.issuesAssigned }));
  if (x.issuesCreated) parts.push(t("ap_ctx_created", { n: x.issuesCreated }));
  if (Array.isArray(x.linkedAccounts) && x.linkedAccounts.length) parts.push(t("ap_ctx_linked", { a: x.linkedAccounts.join(", ") }));
  return parts.length ? `<div class="apctx">${esc(parts.join(" · "))}</div>` : "";
}

function apRow(c) {
  const ids = `data-comment="${c.comment}" data-issue="${c.issue}" data-approver="${c.approver}" data-at="${c.at}"`;
  const state = c.confirmed ? `<span class="idstate ok">${esc(t("ap_confirmed"))}</span>`
    : c.dismissed ? `<span class="idstate">${esc(t("ap_dismissed"))}</span>`
    : `<button class="rowbtn" data-act="confirm" ${ids}>${esc(t("ap_confirm"))}</button>
       <button class="rowbtn ghost" data-act="dismiss" ${ids}>${esc(t("ap_dismiss"))}</button>`;
  const tier = `<span class="cardin${c.tier === "formal" ? " strong" : ""}">${esc(t(c.tier === "formal" ? "tier_formal" : "tier_euphemism"))}</span>`;
  const when = c.at ? new Date(c.at * 1000).toLocaleDateString() : "—";
  return `<tr${c.dismissed ? ' class="id-dim"' : ""}>
    <td><span class="pname">${esc(c.issueKey ?? c.issue)}</span> <span style="color:var(--fg-dim)">${esc(clip(c.summary ?? "", 60))}</span></td>
    <td>${esc(c.approverName ?? c.approver)}${apCtx(c)}</td>
    <td>${tier} <span class="snip">“${esc(c.snippet)}”</span></td>
    <td style="white-space:nowrap;color:var(--fg-dim)">${esc(when)}</td>
    <td style="white-space:nowrap">${state}</td>
  </tr>`;
}

function renderApprovals() {
  const el = $("#approvals"); if (!el) return;
  const head = `<div class="streamhead"><h2>${t("approvals_head")}</h2><div class="bar"></div></div>
    <p class="tagline" style="margin:0 0 12px">${esc(t("ap_tagline"))}</p>`;
  if (APS.kind === "loading") { el.innerHTML = head + `<div class="loading">${t("loading")}</div>`; return; }
  if (APS.kind === "offline") { el.innerHTML = head + `<div class="empty">${esc(t("ap_offline"))}</div>`; return; }
  if (APS.kind === "unauthorized") { el.innerHTML = head + `<div class="err">${t("err_unauthorized")}</div>`; return; }
  if (APS.kind === "error") { el.innerHTML = head + `<div class="err">${esc(t("err_request", { e: APS.message }))}</div>`; return; }
  el.innerHTML = head + (APS.candidates.length
    ? `<div class="tablewrap"><table>
        <thead><tr><th>${t("th_issue")}</th><th>${t("th_approver")}</th><th>${t("th_evidence")}</th><th>${t("th_date")}</th><th>${t("th_state")}</th></tr></thead>
        <tbody>${APS.candidates.map(apRow).join("")}</tbody></table></div>`
    : `<div class="empty">${esc(t("ap_empty"))}</div>`);
}

async function loadApprovals() {
  try {
    const r = await fetch("/api/approvals/candidates");
    if (r.status === 503) { APS = { kind: "offline" }; renderApprovals(); return; }
    if (r.status === 401) { APS = { kind: "unauthorized" }; renderApprovals(); return; }
    const j = await r.json().catch(() => null);
    if (!r.ok || !j) { APS = { kind: "error", message: (j && j.error) || `HTTP ${r.status}` }; renderApprovals(); return; }
    APS = { kind: "data", candidates: Array.isArray(j.candidates) ? j.candidates : [] };
  } catch (e) {
    APS = { kind: "error", message: e.message };
  }
  renderApprovals();
}

// Confirm/Dismiss (event delegation): the reviewer defaults to the signed-in user shown in the
// topbar, else "reviewer" — no prompt, the verdict itself is the interaction.
$("#approvals").addEventListener("click", async (ev) => {
  const btn = ev.target.closest("button[data-act]");
  if (!btn) return;
  btn.disabled = true;
  const reviewer = $("#userPill").hidden ? "reviewer" : ($("#userName").textContent || "reviewer");
  try {
    const r = await fetch("/api/approvals/resolve", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({
        comment: Number(btn.dataset.comment), issue: Number(btn.dataset.issue),
        approver: Number(btn.dataset.approver), at: Number(btn.dataset.at),
        decision: btn.dataset.act, reviewer,
      }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => null);
      throw new Error((j && j.error) || `HTTP ${r.status}`);
    }
  } catch (e) {
    APS = { kind: "error", message: e.message };
    renderApprovals();
    return;
  }
  await loadApprovals();
});

// --- Patterns: mined rule candidates from event regularities (GET /api/patterns/candidates).
// Deterministic counts only — the card shows the counted evidence verbatim: group, support/total,
// the target set, and the exceptions (collapsed). Dismissed patterns are excluded server-side.
// Each card takes a three-way verdict — promote / risk / dismiss — POSTed to /api/patterns/resolve,
// then reload.
let PATS = { kind: "loading" };

const TMPL_KEY = { "issue-assignee": "tmpl_issue_assignee", "comment-author": "tmpl_comment_author", "doc-access": "tmpl_doc_access", "doc-access-scope": "tmpl_doc_access_scope" };

function patCard(c) {
  const period = c.windowFrom
    ? `${new Date(c.windowFrom * 1000).toLocaleDateString()} – ${new Date(c.windowTo * 1000).toLocaleDateString()}`
    : "—";
  const chips = c.targets.map((p) => `<span class="etype">${esc(p.name ?? p.id)}</span>`).join("");
  const exTotal = c.exceptions.length + c.exceptionsOmitted;
  const exceptions = exTotal
    ? `<details class="srcmap" style="margin-top:10px"><summary>${esc(t("pat_exceptions", { n: exTotal }))}</summary>
        <div class="inner"><div class="chips">${c.exceptions.map((e) => `<span class="maprow">${esc(clip(String(e.name ?? e.id), 80))}</span>`).join("")}${
          c.exceptionsOmitted ? `<span class="snip">${esc(t("pat_exceptions_more", { n: c.exceptionsOmitted }))}</span>` : ""}</div></div></details>`
    : "";
  // stability strip mount — every template; the server answers { supported: false } (and the
  // strip quietly disappears) when the engine cannot slice the predicate as-of
  const stab = `<div class="stab" data-stab="${esc(c.patternId)}"><span class="snip">${esc(t("loading"))}</span></div>`;
  return `<div class="card">
    <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
      <span class="cardin">${esc(t(TMPL_KEY[c.template] ?? c.template))}</span>
      <b>${esc(c.group.name ?? c.group.id)}</b>
      <span class="cardin strong">${c.support}/${c.total}</span>
      <span class="snip">${esc(period)}</span>
    </div>
    <div class="chips" style="margin-top:9px"><span class="maprow"><b>${esc(c.predicate)}</b></span>${chips}</div>
    ${stab}
    ${exceptions}
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="rowbtn" data-act="promote" data-id="${esc(c.patternId)}">${esc(t("pat_promote"))}</button>
      <button class="rowbtn ghost" data-act="risk" data-id="${esc(c.patternId)}">${esc(t("pat_risk"))}</button>
      <button class="rowbtn ghost" data-act="dismiss" data-id="${esc(c.patternId)}">${esc(t("pat_dismiss"))}</button>
    </div>
  </div>`;
}

function renderPatterns() {
  const el = $("#patterns"); if (!el) return;
  const head = `<div class="streamhead"><h2>${t("patterns_head")}</h2><div class="bar"></div></div>
    <p class="tagline" style="margin:0 0 12px">${esc(t("pat_tagline"))}</p>`;
  if (PATS.kind === "loading") { el.innerHTML = head + `<div class="loading">${t("loading")}</div>`; return; }
  if (PATS.kind === "offline") { el.innerHTML = head + `<div class="empty">${esc(t("pat_offline"))}</div>`; return; }
  if (PATS.kind === "unauthorized") { el.innerHTML = head + `<div class="err">${t("err_unauthorized")}</div>`; return; }
  if (PATS.kind === "error") { el.innerHTML = head + `<div class="err">${esc(t("err_request", { e: PATS.message }))}</div>`; return; }
  el.innerHTML = head + (PATS.candidates.length
    ? PATS.candidates.map(patCard).join("")
    : `<div class="empty">${esc(t("pat_empty"))}</div>`);
  // stability strips fill in AFTER the cards render — a trace costs month×event as-of reads
  // server-side and must never gate the listing itself
  el.querySelectorAll("[data-stab]").forEach(loadStability);
}

// One candidate's monthly as-of trace → a compact strip: ▮ month covered by the current set,
// ▮(amber) wobble with the actual holder in the tooltip and the wobble ranges spelled out,
// ▪ no population that month. Fewer than 2 measured months says nothing — the strip disappears.
async function loadStability(mount) {
  const ym = (at) => new Date(at * 1000).toISOString().slice(0, 7);
  try {
    const r = await fetch(`/api/patterns/stability?patternId=${encodeURIComponent(mount.dataset.stab)}`);
    const j = await r.json().catch(() => null);
    if (!r.ok || !j) throw new Error((j && j.error) || `HTTP ${r.status}`);
    if (!j.supported || !Array.isArray(j.slices) || j.measured < 2) { mount.remove(); return; }
    const cells = j.slices.map((s) => {
      if (!s.population) return `<i class="nul" title="${esc(ym(s.at))}"></i>`;
      if (s.held) return `<i title="${esc(`${ym(s.at)}: ${s.covered}/${s.population}`)}"></i>`;
      const who = s.top ? String(s.top.name ?? s.top.id) : "?";
      return `<i class="wob" title="${esc(`${ym(s.at)}: ${who} (${s.covered}/${s.population})`)}"></i>`;
    }).join("");
    // consecutive wobble months under the same holder read as one range: "2023-07..2023-09 Bob"
    const runs = [];
    let prevWob = false;
    for (const s of j.slices) {
      const wob = s.population > 0 && !s.held;
      if (wob) {
        const who = s.top ? String(s.top.name ?? s.top.id) : "?";
        const last = runs[runs.length - 1];
        if (prevWob && last && last.who === who) last.to = ym(s.at);
        else runs.push({ from: ym(s.at), to: ym(s.at), who });
      }
      prevWob = wob;
    }
    const wobtxt = runs.length
      ? `<span class="wobtxt">${esc(clip(runs.map((x) => `${x.from}${x.to !== x.from ? `..${x.to}` : ""} ${x.who}`).join(" · "), 120))}</span>`
      : "";
    mount.innerHTML = `${cells}<span class="sum">${esc(t("pat_stab_summary", { h: j.held, m: j.measured }))}${j.sampled ? ` ${esc(t("pat_stab_sampled"))}` : ""}</span>${wobtxt}`;
  } catch (e) {
    console.warn(`stability trace ${mount.dataset.stab}: ${e.message}`);
    mount.remove(); // the strip is progressive enhancement — a failed trace never breaks the card
  }
}

async function loadPatterns() {
  try {
    const r = await fetch("/api/patterns/candidates");
    if (r.status === 503) { PATS = { kind: "offline" }; renderPatterns(); return; }
    if (r.status === 401) { PATS = { kind: "unauthorized" }; renderPatterns(); return; }
    const j = await r.json().catch(() => null);
    if (!r.ok || !j) { PATS = { kind: "error", message: (j && j.error) || `HTTP ${r.status}` }; renderPatterns(); return; }
    PATS = { kind: "data", candidates: Array.isArray(j.candidates) ? j.candidates : [] };
  } catch (e) {
    PATS = { kind: "error", message: e.message };
  }
  renderPatterns();
}

// Promote/Risk/Dismiss (event delegation): the verdict itself is the whole interaction — no prompt.
$("#patterns").addEventListener("click", async (ev) => {
  const btn = ev.target.closest("button[data-act]");
  if (!btn) return;
  btn.disabled = true;
  try {
    const r = await fetch("/api/patterns/resolve", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ patternId: btn.dataset.id, verdict: btn.dataset.act }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => null);
      throw new Error((j && j.error) || `HTTP ${r.status}`);
    }
  } catch (e) {
    PATS = { kind: "error", message: e.message };
    renderPatterns();
    return;
  }
  await loadPatterns();
});

// --- Inferences: deterministic doc→project affinities from grant neighborhoods
// (GET /api/inferences/candidates). Unanimous rows render as auto-filled evaluated values (no
// verdict to take — they re-answer as the graph changes); ambiguous majorities take
// confirm/dismiss, POSTed to /api/inferences/resolve, then reload.
let INFS = { kind: "loading" };

function infRow(r, filled) {
  const cite = r.supporters.map((s) => {
    const g = esc(String(s.grantee.name ?? s.grantee.id));
    return s.via ? `${g} <span class="snip">${esc(t("inf_via", { name: String(s.via.name ?? s.via.id) }))}</span>` : g;
  }).join(", ");
  const state = r.confirmed
    ? `<span class="idstate ok">${esc(t("inf_confirmed"))}</span>`
    : r.dismissed
      ? `<span class="idstate">${esc(t("inf_dismissed"))}</span>`
      : "";
  const buttons = filled || r.confirmed || r.dismissed
    ? ""
    : `<button class="rowbtn" data-inf="confirm" data-doc="${r.doc.id}" data-project="${r.project.id}">${esc(t("inf_confirm"))}</button>
       <button class="rowbtn ghost" data-inf="dismiss" data-doc="${r.doc.id}" data-project="${r.project.id}">${esc(t("inf_dismiss"))}</button>`;
  return `<div class="card">
    <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
      <b>${esc(String(r.doc.name ?? r.doc.id))}</b>
      <span class="maprow"><b>relates-to-project</b></span>
      <span class="etype">${esc(String(r.project.name ?? r.project.id))}</span>
      <span class="cardin strong">${esc(t("inf_support", { k: r.support, n: r.resolvable }))}</span>
      ${filled ? `<span class="cardin">${esc(t("inf_filled_head"))}</span>` : ""}
      ${state}
    </div>
    <div class="snip" style="margin-top:8px">${cite}</div>
    ${buttons ? `<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">${buttons}</div>` : ""}
  </div>`;
}

function renderInferences() {
  const el = $("#inferences"); if (!el) return;
  const head = `<div class="streamhead"><h2>${t("inf_head")}</h2><div class="bar"></div></div>
    <p class="tagline" style="margin:0 0 12px">${esc(t("inf_tagline"))}</p>`;
  if (INFS.kind === "loading") { el.innerHTML = head + `<div class="loading">${t("loading")}</div>`; return; }
  if (INFS.kind === "offline") { el.innerHTML = head + `<div class="empty">${esc(t("inf_offline"))}</div>`; return; }
  if (INFS.kind === "unauthorized") { el.innerHTML = head + `<div class="err">${t("err_unauthorized")}</div>`; return; }
  if (INFS.kind === "error") { el.innerHTML = head + `<div class="err">${esc(t("err_request", { e: INFS.message }))}</div>`; return; }
  const rows = [...INFS.filled.map((r) => infRow(r, true)), ...INFS.candidates.map((r) => infRow(r, false))];
  el.innerHTML = head + (rows.length ? rows.join("") : `<div class="empty">${esc(t("inf_empty"))}</div>`);
}

async function loadInferences() {
  try {
    const r = await fetch("/api/inferences/candidates");
    if (r.status === 503) { INFS = { kind: "offline" }; renderInferences(); return; }
    if (r.status === 401) { INFS = { kind: "unauthorized" }; renderInferences(); return; }
    const j = await r.json().catch(() => null);
    if (!r.ok || !j) { INFS = { kind: "error", message: (j && j.error) || `HTTP ${r.status}` }; renderInferences(); return; }
    INFS = { kind: "data", filled: Array.isArray(j.filled) ? j.filled : [], candidates: Array.isArray(j.candidates) ? j.candidates : [] };
  } catch (e) {
    INFS = { kind: "error", message: e.message };
  }
  renderInferences();
}

$("#inferences").addEventListener("click", async (ev) => {
  const btn = ev.target.closest("button[data-inf]");
  if (!btn) return;
  btn.disabled = true;
  try {
    const r = await fetch("/api/inferences/resolve", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ doc: Number(btn.dataset.doc), project: Number(btn.dataset.project), decision: btn.dataset.inf }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => null);
      throw new Error((j && j.error) || `HTTP ${r.status}`);
    }
  } catch (e) {
    INFS = { kind: "error", message: e.message };
    renderInferences();
    return;
  }
  await loadInferences();
});

async function load() {
  try {
    const r = await fetch("/api/model");
    if (r.status === 404) { STATE = { kind: "unavailable" }; render(); return; }
    if (r.status === 401) { STATE = { kind: "unauthorized" }; render(); return; }
    const text = await r.text();
    let j; try { j = JSON.parse(text); } catch { j = null; }
    if (!r.ok || !j) { STATE = { kind: "error", message: (j && j.error) || `HTTP ${r.status}` }; render(); return; }
    STATE = { kind: "data", data: j };
  } catch (e) {
    STATE = { kind: "error", message: e.message };
  }
  render();
}

applyTheme();
setLang(LANG);
refreshStatus();
load();
loadIdentities();
loadApprovals();
loadPatterns();
loadInferences();
</script>
