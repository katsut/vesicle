<style>
  /* Same-origin cross-document view transitions: switching screens crossfades instead of
     repainting. Progressive enhancement; motion respects the reduced-motion preference. */
  @view-transition{navigation:auto}
  @media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}
  :root {
    /* Shared StromaDB design-system tokens — EARTH theme (see wizard.html) */
    --bg:#f2efe6; --bg-2:#eae5d9; --panel:#fffdf7; --panel-2:#f6f1e7;
    --line:#e5dfd1; --line-2:#d4ccba; --fg:#211d15; --fg-dim:#574f40; --mut:#8b8371;
    --accent:#2f9e73; --accent-2:#237a58; --accent-ink:#ffffff;
    --r:10px; --r-sm:7px;
    --shadow:0 1px 0 rgba(0,0,0,.02), 0 14px 30px -16px rgba(60,50,30,.22);
    --bevel:inset 0 1px 0 rgba(255,255,255,.6);
    --panel-grad:linear-gradient(163deg,color-mix(in oklab,var(--panel) 86%,var(--bg-2) 14%),var(--panel));
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,sans-serif;
    --sky:#2c6fa6; --sky-soft:#e6eef5; --clay:#b06a2a; --clay-soft:#f6ecdd; --leaf:#2f9e73; --leaf-soft:#e3f0e9;
    --good:#237a58; --bad:#a23b3b;
  }
  html[data-theme="dark"]{
    --bg:#13181a; --bg-2:#181e20; --panel:#1d2427; --panel-2:#222a2d;
    --line:#2b3437; --line-2:#3a4548; --fg:#e9ede9; --fg-dim:#a9b3ab; --mut:#6f7a72;
    --accent:#40c091; --accent-2:#35a67c; --accent-ink:#eaf6f0;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 16px 34px -14px rgba(0,0,0,.62);
    --bevel:inset 0 1px 0 rgba(255,255,255,.05);
    --sky:#5aa0d8; --sky-soft:#182734; --clay:#d0955a; --clay-soft:#2c2418; --leaf:#40c091; --leaf-soft:#15271e;
    --good:#40c091; --bad:#e0707e;
  }
  html[data-theme="dark"] body{background:
    radial-gradient(1200px 620px at 84% -12%, #17332b 0%, transparent 58%),
    radial-gradient(1000px 560px at -10% 108%, #16272f 0%, transparent 55%),
    radial-gradient(1100px 520px at 50% 118%, #241d13 0%, transparent 62%),
    var(--bg);background-attachment:fixed}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--fg);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1300px 640px at 82% -14%, #f4e4b6 0%, transparent 56%),
      linear-gradient(180deg, #f5f3ec 0%, transparent 40%),
      radial-gradient(900px 520px at -8% 104%, #dbe8d1 0%, transparent 56%),
      radial-gradient(1300px 560px at 50% 116%, #ebd9b3 0%, transparent 60%),
      var(--bg);
    background-attachment:fixed}
  .wrap{max-width:1400px;margin:0 auto;padding:6px 14px 60px}
  .topbar{view-transition-name:topbar}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,color-mix(in oklab,var(--bg) 90%,transparent),color-mix(in oklab,var(--bg) 62%,transparent));backdrop-filter:blur(11px);border-bottom:1px solid var(--line);margin-bottom:18px}
  .topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:11px;padding:9px 14px;flex-wrap:wrap}
  .mark{display:inline-flex;align-items:center;gap:10px;font-weight:640;letter-spacing:.2px;font-size:16px}
  .mark .dot{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 34% 32%,#3fbfa2 0%,var(--accent) 46%,var(--accent-2) 100%);box-shadow:inset 0 0 0 3px rgba(255,255,255,.55),0 1px 3px rgba(14,110,92,.4)}
  .mark small{font-weight:500;color:var(--mut);font-size:12px}
  .pill{display:inline-flex;align-items:center;gap:6px;font:500 11.5px/1 var(--mono);color:var(--fg-dim);background:var(--panel);border:1px solid var(--line);border-radius:100px;padding:6px 10px;white-space:nowrap}
  .pill b{color:var(--fg);font-weight:600}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px color-mix(in oklab,var(--accent) 80%,transparent);flex:none}
  .pill.off{color:var(--mut)} .pill.off .dot{background:var(--mut);box-shadow:none}
  .pill[hidden]{display:none}
  .spacer{flex:1}
  .ctls{display:flex;align-items:center;gap:8px}
  .ctl{background:linear-gradient(180deg,color-mix(in oklab,var(--panel) 84%,var(--fg-dim) 16%),color-mix(in oklab,var(--panel) 96%,#000 4%));border:1px solid var(--line-2);color:var(--fg-dim);border-radius:var(--r-sm);min-width:34px;height:34px;padding:0 9px;font:inherit;font-size:13px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 2px 6px -3px rgba(0,0,0,.3);transition:color .15s,border-color .15s,filter .15s}
  .ctl:hover{color:var(--fg);border-color:var(--accent);filter:brightness(1.05)}
  .ctl.select{padding:0}
  .ctl select{appearance:none;background:transparent;border:none;color:inherit;font:inherit;font-size:12.5px;padding:0 10px;height:34px;cursor:pointer}
  .tagline{color:var(--fg-dim);font-size:13.5px;margin:2px 0 18px;max-width:76ch}
  .tagline b{color:var(--fg);font-weight:600}
  .streamhead{display:flex;align-items:center;gap:10px;margin:2px 2px 12px}
  .streamhead h2{font-size:15px;margin:0;letter-spacing:-.01em}
  .streamhead .bar{flex:1;height:1px;background:var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;align-items:start}
  .card{background:var(--panel-grad);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--bevel),var(--shadow)}
  .card.planned{opacity:.55}
  .shead{display:flex;align-items:center;gap:9px;margin-bottom:4px}
  .ic{flex:none;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700;background:color-mix(in oklab,var(--accent) 18%,transparent);color:var(--accent)}
  .ic.clay{background:color-mix(in oklab,var(--clay) 22%,transparent);color:var(--clay)}
  .ic.txt{background:color-mix(in oklab,var(--sky) 20%,transparent);color:var(--sky)}
  .shead b{font-size:14px}
  .st{margin-left:auto;flex:none;font:700 9.5px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:100px;border:1px solid var(--line);color:var(--mut);background:var(--panel-2)}
  .st.ok{color:var(--accent);background:color-mix(in oklab,var(--accent) 15%,transparent);border-color:color-mix(in oklab,var(--accent) 34%,transparent)}
  .st.bad{color:var(--bad);background:color-mix(in oklab,var(--bad) 10%,transparent);border-color:color-mix(in oklab,var(--bad) 34%,transparent)}
  .sdesc{color:var(--mut);font-size:12.5px;margin:0 0 12px}
  label{display:block;font:600 11px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:0 0 6px}
  input,select{width:100%;font:inherit;font-size:13.5px;color:var(--fg);background:var(--panel-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 11px}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in oklab,var(--accent) 22%,transparent)}
  .btn{font:inherit;font-weight:640;font-size:13.5px;border:1px solid transparent;border-radius:var(--r-sm);padding:9px 14px;cursor:pointer;color:var(--accent-ink);background:linear-gradient(180deg,var(--accent),var(--accent-2));box-shadow:inset 0 1px 0 rgba(255,255,255,.3);transition:filter .15s}
  .btn:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent;border-color:var(--line-2);color:var(--fg);box-shadow:none}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn:disabled{opacity:.5;cursor:default;filter:none}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .conn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-dim);margin-bottom:12px;flex-wrap:wrap}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none}
  .conn a{color:var(--fg-dim)}
  .hint{color:var(--mut);font-size:12.5px;margin:0 0 12px;line-height:1.45}
  .hint b{color:var(--fg);font-weight:600}
  .pollstat{margin-top:12px;font:12.5px/1.5 var(--mono);color:var(--accent-2);display:flex;align-items:center;gap:8px}
  .pollstat .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.4s ease-in-out infinite;flex:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  /* Backlog poll-lane list (one row per project) */
  .lanes{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .lane{font:12.5px/1.5 var(--mono);color:var(--accent-2);display:flex;align-items:center;gap:8px}
  .lane.stopped{color:var(--mut)}
  .lane .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.4s ease-in-out infinite;flex:none}
  .lane .line{flex:1;min-width:0;overflow-wrap:anywhere}
  .lane .btn{flex:none;padding:4px 10px;font-size:12px}
  .msg{margin-top:12px;font:12.5px/1.5 var(--mono);white-space:pre-wrap;word-break:break-word;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--line)}
  .msg.ok{color:var(--good);background:color-mix(in oklab,var(--accent) 8%,transparent);border-color:color-mix(in oklab,var(--accent) 30%,transparent)}
  .msg.err{color:var(--bad);background:color-mix(in oklab,var(--bad) 8%,transparent);border-color:color-mix(in oklab,var(--bad) 30%,transparent)}
  .err{color:var(--bad);font-size:13px;background:color-mix(in oklab,var(--bad) 10%,var(--panel));border:1px solid color-mix(in oklab,var(--bad) 34%,var(--line));border-radius:var(--r-sm);padding:10px 12px;margin:8px 0}
  .err a{color:inherit}
  .loading{color:var(--mut);font-size:13px;padding:8px 0}
  .note{margin-top:18px;padding:11px 13px;background:var(--panel-grad);border:1px solid var(--line);border-radius:var(--r);font-size:12.5px;color:var(--fg-dim);line-height:1.5;box-shadow:var(--bevel),var(--shadow)}
  .note a{color:var(--accent-2);font-weight:600}
  /* Drive body-lane funnel (checklist inside the card) */
  .fsec{margin-top:14px;border-top:1px solid var(--line);padding-top:11px}
  .flist{display:flex;flex-direction:column;gap:2px;max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 8px;background:var(--panel-2)}
  .fitem{display:flex;align-items:center;gap:7px;margin:0;padding:3px 0;cursor:pointer;font:500 12.5px/1.4 var(--sans);color:var(--fg);text-transform:none;letter-spacing:0}
  .fitem input{width:auto;flex:none;margin:0;accent-color:var(--accent)}
  .fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ftag{flex:none;font:600 9.5px/1 var(--mono);letter-spacing:.04em;border:1px solid var(--line-2);border-radius:100px;padding:3px 6px;color:var(--mut);background:var(--panel)}
  .ftag.draft{color:var(--clay);border-color:color-mix(in oklab,var(--clay) 40%,transparent);background:var(--clay-soft)}
  .ftag.lbl{color:var(--sky);border-color:color-mix(in oklab,var(--sky) 34%,transparent);background:var(--sky-soft)}
  .fres{font:12px/1.6 var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fres.ok{color:var(--good)} .fres.bad{color:var(--bad)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.pollstat .dot,.lane .dot{animation:none}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner">
  <span class="mark"><span class="dot"></span>Vesicle</span>

<div class="wrap">

  <div class="grid">
    <div class="card" id="backlogCard">
      <div class="shead"><span class="ic clay">B</span><b>Backlog</b><span class="st" id="blStatus" data-i18n="st_checking"></span></div>
      <p class="sdesc" data-i18n="backlog_desc"></p>
      <div id="blBody"><div class="loading" data-i18n="loading"></div></div>
    </div>
    <div class="card" id="gdriveCard">
      <div class="shead"><span class="ic">D</span><b>Google Drive</b><span class="st" id="gdStatus" data-i18n="st_checking"></span></div>
      <p class="sdesc" data-i18n="gdrive_desc"></p>
      <div id="gdBody"><div class="loading" data-i18n="loading"></div></div>
    </div>
    <div class="card planned">
      <div class="shead"><span class="ic">P</span><b>PostgreSQL</b><span class="st" data-i18n="planned"></span></div>
      <p class="sdesc" data-i18n="planned_desc"></p>
    </div>
    <div class="card planned">
      <div class="shead"><span class="ic clay">J</span><b>Jira</b><span class="st" data-i18n="planned"></span></div>
      <p class="sdesc" data-i18n="planned_desc"></p>
    </div>
    <div class="card planned">
      <div class="shead"><span class="ic txt">C</span><b>Confluence</b><span class="st" data-i18n="planned"></span></div>
      <p class="sdesc" data-i18n="planned_desc"></p>
    </div>
  </div>

  <div class="note" data-i18n="lanes_note"></div>
</div>

let LANG = "en";
function t(k, v) {
  let s = (I18N[LANG] && I18N[LANG][k]) || I18N.en[k] || k;
  if (v) for (const [key, val] of Object.entries(v)) s = s.replaceAll("{" + key + "}", String(val));
  return s;
}
function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach((e) => { e.innerHTML = t(e.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-title]").forEach((e) => { e.title = t(e.getAttribute("data-i18n-title")); });
  renderBacklog();
  renderGdrive();
}

const store = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch {} },
};

// --- theme (shared key with the wizard) ---
let THEME = store.get("vesicle-theme") || "auto";
const media = window.matchMedia("(prefers-color-scheme: dark)");
function resolvedDark() { return THEME === "dark" || (THEME === "auto" && media.matches); }
function applyTheme() {
  document.documentElement.setAttribute("data-theme", resolvedDark() ? "dark" : "light");
  $("#themeBtn").textContent = resolvedDark() ? "☾" : "☀";
}
function setTheme(v) { THEME = v; store.set("vesicle-theme", v); applyTheme(); }
media.addEventListener?.("change", () => { if (THEME === "auto") applyTheme(); });
$("#themeBtn").onclick = () => setTheme(resolvedDark() ? "light" : "dark");

// --- language ---
function setLang(l) { LANG = l; store.set("vesicle-lang", l); $("#lang").value = l; applyLang(); }
LANG = store.get("vesicle-lang") || "en";
$("#lang").onchange = (e) => setLang(e.target.value);
$("#logoutBtn").onclick = async () => { await fetch("/api/logout", { method: "POST" }); location.reload(); };

async function jf(url, opts) {
  const r = await fetch(url, opts);
  const text = await r.text();
  let b; try { b = JSON.parse(text); } catch { b = { error: text || r.statusText }; }
  if (!r.ok) { const e = new Error(b.error || `HTTP ${r.status}`); e.status = r.status; throw e; }
  return b;
}

// --- topbar connection pill ---
async function refreshStatus() {
  try {
    const s = await jf("/api/status");
    $("#connPill").classList.toggle("off", !s.stroma);
    $("#connPill").title = `StromaDB · ${s.url}`;
    $("#connText").textContent = s.stroma ? "stroma" : "stroma offline";
    if (s.auth && s.user) { $("#userName").textContent = s.user; $("#userPill").hidden = false; }
  } catch {
    $("#connPill").classList.add("off"); $("#connText").textContent = "stroma offline";
  }
}

// --- Backlog card state machine: loading → error | disconnected | connected ---
// lanes mirrors /api/backlog/poll/status — one poll lane per project.
const BL = { state: "loading", host: null, projects: null, projectsError: null, lanes: [], msg: null, error: null };
let pollTimer = null;

function setStatusChip() {
  const chip = $("#blStatus");
  chip.classList.remove("ok", "bad");
  if (BL.state === "loading") chip.textContent = t("st_checking");
  else if (BL.state === "error") { chip.textContent = t("st_error"); chip.classList.add("bad"); }
  else if (BL.state === "connected") { chip.textContent = t("st_connected"); chip.classList.add("ok"); }
  else chip.textContent = t("st_disconnected");
}

function renderBacklog() {
  setStatusChip();
  const root = $("#blBody"); root.innerHTML = "";
  if (BL.state === "loading") { root.innerHTML = `<div class="loading">${t("loading")}</div>`; return; }
  if (BL.state === "error") {
    root.innerHTML = `<div class="err">${BL.error.status === 401 ? t("err_unauthorized") : esc(t("err_request", { e: BL.error.message }))}</div>`;
    return;
  }
  if (BL.state === "disconnected") {
    root.innerHTML = `
      <form id="connectForm" action="/api/backlog/oauth/start" method="get">
        <label for="host">${t("host_label")}</label>
        <input id="host" name="host" placeholder="example.backlog.com" autocomplete="off" spellcheck="false" required>
        <div class="actions"><button class="btn" type="submit">${t("connect_btn")}</button></div>
        <div id="hostErr"></div>
      </form>`;
    $("#connectForm").addEventListener("submit", (e) => {
      const host = $("#host").value.trim().toLowerCase();
      if (!/^[a-z0-9-]+\.(backlog\.(com|jp)|backlogtool\.com)$/.test(host)) {
        e.preventDefault();
        $("#hostErr").innerHTML = `<div class="msg err">${t("host_invalid")}</div>`;
      }
    });
    return;
  }
  // connected
  const projOpts = (BL.projects ?? []).map((p) =>
    `<option value="${esc(p.projectKey)}">${esc(p.name)} (${esc(p.projectKey)})</option>`).join("")
    || `<option>${t("no_projects")}</option>`;
  root.innerHTML = `
    <div class="conn"><span class="dot"></span> ${t("connected_to")} <b>${esc(BL.host)}</b> · <a href="#" id="disconnect">${t("disconnect")}</a></div>
    <p class="hint">${t("mode_hint")}</p>
    <label for="project">${t("project_label")}</label>
    <select id="project">${projOpts}</select>
    <div class="actions">
      <button class="btn" id="startPoll">${t("start_poll")}</button>
      <button class="btn ghost" id="install" title="${esc(t("webhook_needs"))}">${t("install_webhook")}</button>
    </div>
    ${BL.lanes.length ? `<div class="lanes">${BL.lanes.map(laneRow).join("")}</div>` : ""}
    <div id="msg"></div>`;
  if (BL.projectsError) show("err", BL.projectsError);
  if (BL.msg) show(BL.msg.kind, BL.msg.text);
  $("#disconnect").onclick = async (e) => {
    e.preventDefault();
    try { await jf("/api/backlog/disconnect", { method: "POST" }); BL.msg = null; await refresh(); }
    catch (err) { show("err", err.message); }
  };
  // Start adds the lane for the selected project — or resumes it if it already exists.
  $("#startPoll").onclick = async () => {
    const project = $("#project").value; if (!project) return;
    $("#startPoll").disabled = true;
    try {
      await jf("/api/backlog/poll/start", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ project }) });
      BL.msg = { kind: "ok", text: t("msg_started", { project }) };
      await pollStatus();
      renderBacklog();
    } catch (e) { show("err", e.message); }
    finally { const b = $("#startPoll"); if (b) b.disabled = false; }
  };
  // per-lane stop / resume
  root.querySelectorAll("button[data-act]").forEach((b) => {
    b.onclick = async () => {
      const project = b.getAttribute("data-project");
      const resume = b.getAttribute("data-act") === "start";
      b.disabled = true;
      try {
        await jf(`/api/backlog/poll/${resume ? "start" : "stop"}`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ project }) });
        BL.msg = { kind: "ok", text: resume ? t("msg_started", { project }) : t("msg_stopped") };
        await pollStatus();
        renderBacklog();
      } catch (e) { show("err", e.message); }
    };
  });
  $("#install").onclick = async () => {
    const project = $("#project").value; if (!project) return;
    $("#install").disabled = true;
    try {
      const r = await jf("/api/backlog/webhook", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ project }) });
      BL.msg = { kind: "ok", text: t("msg_webhook", { id: r.id, project, url: r.hookUrl }) };
      renderBacklog();
    } catch (e) { show("err", e.message); }
    finally { const b = $("#install"); if (b) b.disabled = false; }
  };
}
function show(kind, text) { const m = $("#msg"); if (m) { m.className = "msg " + kind; m.textContent = text; } }

// One row per poll lane: the streaming/stopped line plus a stop or resume button.
function laneLine(l) {
  const err = l.error ? ` · <span style="color:var(--bad)">${esc(l.error)}</span>` : "";
  return esc(t(l.running ? "streaming_line" : "stopped_line", { project: l.project ?? "?", n: l.ingested ?? 0 })) + err;
}
function laneRow(l) {
  return `<div class="lane${l.running ? "" : " stopped"}" data-lane="${esc(l.project ?? "")}">
      ${l.running ? `<span class="dot"></span>` : ""}<span class="line">${laneLine(l)}</span>
      <button class="btn ghost" data-act="${l.running ? "stop" : "start"}" data-project="${esc(l.project ?? "")}">${t(l.running ? "stop_poll" : "resume_poll")}</button>
    </div>`;
}
// Re-render only when the lane set or a lifecycle bit changes; counters refresh in place.
const laneSig = (lanes) => (lanes ?? []).map((l) => `${l.project}:${l.running}:${l.state}`).join("|");

async function pollStatus() {
  try {
    const prev = laneSig(BL.lanes);
    BL.lanes = (await jf("/api/backlog/poll/status")).lanes ?? [];
    if (BL.lanes.some((l) => l.running)) { if (!pollTimer) pollTimer = setInterval(pollStatus, 4000); }
    else if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (laneSig(BL.lanes) !== prev) renderBacklog();
    else for (const l of BL.lanes) { // refresh the counter lines in place
      const el = document.querySelector(`.lane[data-lane="${l.project}"] .line`);
      if (el) el.innerHTML = laneLine(l);
    }
  } catch { /* transient poll-status failure: keep the last known state */ }
}

async function refresh() {
  try {
    const s = await jf("/api/backlog/status");
    if (!s.connected) { BL.state = "disconnected"; renderBacklog(); return; }
    BL.state = "connected"; BL.host = s.host;
    BL.projects = null; BL.projectsError = null;
    try { BL.projects = (await jf("/api/backlog/projects")).projects; }
    catch (e) { BL.projectsError = e.status === 401 ? t("err_unauthorized") : e.message; }
    await pollStatus();
    renderBacklog();
  } catch (e) {
    BL.state = "error"; BL.error = e; renderBacklog();
  }
}

function setGdStatusChip() {

  else if (GD.state === "connected") { chip.textContent = t("st_connected"); chip.classList.add("ok"); }
  else chip.textContent = t("st_disconnected");
}

// "my-drive" | "drive:<id>" | "folder:<id>" → a display name (shared-drive ids resolve via the picker list)
function gdScopeName(scope) {
  if (!scope) return "?";
  if (scope === "my-drive") return "My Drive";
  if (scope.startsWith("drive:")) {
    const id = scope.slice(6);
    const d = (GD.scopes ?? []).find((s) => s.kind === "drive" && s.id === id);
    return d ? d.name : id;
  }
  if (scope.startsWith("folder:")) return "folder " + scope.slice(7);
  return scope;
}
function gdStreamLine() {
  let line = t("gd_streaming_line", { scope: esc(gdScopeName(GD.poll?.scope)), n: GD.poll?.ingested ?? 0 });
  if (GD.poll?.phase === "listing") line += " · " + t("gd_phase_listing");
  if (GD.poll?.error) line += ` · <span style="color:var(--bad)">${esc(GD.poll.error)}</span>`;
  return line;
}

  $("#gdScope").onchange = syncFolder;
  if (running && GD.poll.scope) {
    if (GD.poll.scope.startsWith("folder:")) { $("#gdScope").value = "folder"; $("#gdFolder").value = GD.poll.scope.slice(7); }
    else if ([...$("#gdScope").options].some((o) => o.value === GD.poll.scope)) $("#gdScope").value = GD.poll.scope;
    syncFolder();
    $("#gdPollstat").innerHTML = `<span class="dot"></span> ${gdStreamLine()}`;
  }
  if (GD.msg) gdShow(GD.msg.kind, GD.msg.text);
  $("#gdDisconnect").onclick = async (e) => {
    e.preventDefault();
    try { await jf("/api/gdrive/disconnect", { method: "POST" }); GD.msg = null; await refreshGdrive(); }
    catch (err) { gdShow("err", err.message); }
  };
  $("#gdStart").onclick = async () => {
    const v = $("#gdScope").value;
    let scope;
    if (v === "my-drive") scope = { kind: "my-drive" };
    else if (v === "folder") {
      const raw = $("#gdFolder").value.trim();
      if (!raw) { gdShow("err", t("gd_folder_invalid")); return; }
      scope = { kind: "folder", id: raw };
    } else scope = { kind: "drive", id: v.slice(6) };
    $("#gdStart").disabled = true;
    try {
      const r = await jf("/api/gdrive/poll/start", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ scope }) });
      GD.msg = { kind: "ok", text: t("gd_msg_started", { scope: gdScopeName(r.scope) }) };
      await gdPollStatus();
    } catch (e) { gdShow("err", e.message); }
    finally { const b = $("#gdStart"); if (b) b.disabled = false; }
  };
  $("#gdStop").onclick = async () => {
    try { await jf("/api/gdrive/poll/stop", { method: "POST" }); GD.msg = { kind: "ok", text: t("msg_stopped") }; await gdPollStatus(); }
    catch (e) { gdShow("err", e.message); }
  };
  renderFunnel();
  renderAcl();
}
function gdShow(kind, text) { const m = $("#gdMsg"); if (m) { m.className = "msg " + kind; m.textContent = text; } }

// --- Drive body-lane funnel: curate → read (one-shot extraction; drafts pre-deselected) ---
function gdCurrentScope() {
  const sel = $("#gdScope");
  if (!sel) return null;
  if (sel.value === "my-drive") return "my-drive";
  if (sel.value === "folder") { const raw = $("#gdFolder").value.trim(); return raw ? "folder:" + raw : null; }
  return sel.value; // "drive:<id>"
}

// mimeType → a short display kind for the skipped summary ("images 3, sheets 2, …")
function mimeKind(m) {
  if (m.startsWith("image/")) return "images";
  if (m.startsWith("video/")) return "video";
  if (m.startsWith("audio/")) return "audio";
  const map = {
    "application/vnd.google-apps.spreadsheet": "sheets",
    "application/vnd.google-apps.presentation": "slides",
    "application/vnd.google-apps.folder": "folders",
    "application/vnd.google-apps.form": "forms",
    "application/vnd.google-apps.shortcut": "shortcuts",
    "text/plain": "text",
  };
  return map[m] || m.split("/").pop();
}
function skippedSummary(skipped) {
  const byKind = {};
  for (const [m, n] of Object.entries(skipped)) { const k = mimeKind(m); byKind[k] = (byKind[k] || 0) + n; }
  return Object.entries(byKind).sort((a, b) => b[1] - a[1]).map(([k, n]) => `${k} ${n}`).join(", ");
}

function extractResultsHtml() {
  const R = GD.extract.results;
  const rows = R.map((r) => r.ok
    ? `<div class="fres ok">✓ ${esc(r.name)} · ${r.facts}</div>`
    : `<div class="fres bad">✗ ${esc(r.name)} · ${esc(r.error || "failed")}</div>`).join("");
  const okN = R.filter((r) => r.ok).length;
  const facts = R.reduce((a, r) => a + (r.facts || 0), 0);
  return `<div class="msg ${okN === R.length ? "ok" : "err"}" style="margin-top:10px">${esc(t("gd_read_done", { ok: okN, n: R.length, facts }))}</div>
    <div style="margin-top:6px">${rows}</div>`;
}

function renderFunnel() {
  const root = $("#gdFunnelBody");
  if (!root) return;
  const F = GD.funnel;
  const busy = !!(GD.extract && GD.extract.running);
  let html = "";
  if (!F) {
    html = `<div class="actions" style="margin-top:0"><button class="btn ghost" id="gdLoadDocs">${t("gd_load_docs")}</button></div>`;
  } else if (F.state === "loading") {
    html = `<div class="loading">${t("loading")}</div>`;
  } else if (F.state === "error") {
    html = `<div class="msg err" style="margin-top:0">${esc(F.error)}</div>
      <div class="actions"><button class="btn ghost" id="gdLoadDocs">${t("gd_load_docs")}</button></div>`;
  } else {
    const skippedTotal = Object.values(F.skipped).reduce((a, b) => a + b, 0);
    const items = F.files.map((f) => `
      <label class="fitem">
        <input type="checkbox" data-fid="${esc(f.id)}" ${GD.sel.has(f.id) ? "checked" : ""} ${busy ? "disabled" : ""}>
        <span class="ftag">${f.mimeType === "application/pdf" ? "PDF" : "Doc"}</span>
        <span class="fname" title="${esc(f.name)}">${esc(f.name)}</span>
        ${f.draft ? `<span class="ftag draft">${t("gd_draft")}</span>` : ""}
        <span class="ftag lbl">L${f.label}</span>
      </label>`).join("");
    html = `
      ${F.truncated ? `<div class="hint" style="margin:0 0 6px">${t("gd_truncated")}</div>` : ""}
      ${F.files.length ? `<div class="flist">${items}</div>` : `<div class="hint" style="margin:0">${t("gd_no_readable")}</div>`}
      ${skippedTotal ? `<div class="hint" style="margin:6px 0 0">${esc(t("gd_skipped", { n: skippedTotal, kinds: skippedSummary(F.skipped) }))}</div>` : ""}
      <div class="actions">
        <button class="btn" id="gdRead" ${GD.sel.size && !busy ? "" : "disabled"}>${t("gd_read_selected", { m: GD.sel.size })}</button>
        <button class="btn ghost" id="gdLoadDocs" ${busy ? "disabled" : ""}>↻ ${t("gd_load_docs")}</button>
      </div>
      ${busy ? `<div class="pollstat"><span class="dot"></span> ${esc(t("gd_read_busy", { m: GD.extract.count }))}</div>` : ""}
      ${GD.extract && GD.extract.error ? `<div class="msg err" style="margin-top:10px">${esc(GD.extract.error)}</div>` : ""}
      ${GD.extract && GD.extract.results ? extractResultsHtml() : ""}`;
  }
  root.innerHTML = html;
  const load = $("#gdLoadDocs"); if (load) load.onclick = loadFunnel;
  const read = $("#gdRead"); if (read) read.onclick = readSelected;
  root.querySelectorAll("input[data-fid]").forEach((cb) => {
    cb.onchange = () => {
      const id = cb.getAttribute("data-fid");
      if (cb.checked) GD.sel.add(id); else GD.sel.delete(id);
      const btn = $("#gdRead");
      if (btn) { btn.disabled = !GD.sel.size; btn.textContent = t("gd_read_selected", { m: GD.sel.size }); }
    };
  });
}

async function loadFunnel() {
  const scope = gdCurrentScope();
  if (!scope) { GD.funnel = { state: "error", error: t("gd_folder_invalid") }; renderFunnel(); return; }
  GD.funnel = { state: "loading" };
  GD.extract = null;
  renderFunnel();
  try {
    const r = await jf("/api/gdrive/funnel?scope=" + encodeURIComponent(scope));
    GD.funnel = { state: "loaded", scope, files: r.files, skipped: r.skipped, total: r.total, truncated: r.truncated };
    GD.sel = new Set(r.files.filter((f) => !f.draft).map((f) => f.id)); // drafts listed but pre-deselected
  } catch (e) {
    GD.funnel = { state: "error", error: e.message };
  }
  renderFunnel();
}

// --- Access-policy check: declared floors (requires-floor) vs observed sharing — deterministic ---
function renderAcl() {
  const root = $("#gdAclBody");
  if (!root) return;
  const A = GD.acl;
  let html = "";
  if (!A) {
    html = `<div class="actions" style="margin-top:0"><button class="btn ghost" id="gdAclCheck">${t("gd_acl_check")}</button></div>`;
  } else if (A.state === "loading") {
    html = `<div class="loading">${t("loading")}</div>`;
  } else if (A.state === "error") {
    html = `<div class="msg err" style="margin-top:0">${esc(A.error)}</div>
      <div class="actions"><button class="btn ghost" id="gdAclCheck">${t("gd_acl_check")}</button></div>`;
  } else {
    const R = A.report;
    const head = R.violations.length
      ? `<div class="msg err" style="margin-top:0">${esc(t("gd_acl_found", { n: R.violations.length, w: R.withFloor, c: R.checked }))}</div>`
      : `<div class="msg ok" style="margin-top:0">${esc(t("gd_acl_ok", { w: R.withFloor, c: R.checked }))}</div>`;
    const rows = R.violations.map((v) => `
      <div class="fitem" style="cursor:default">
        <span class="fname" title="${esc(v.name)}">${esc(v.name)}</span>
        <span class="ftag lbl">L${v.observed} &lt; L${v.required}</span>
        ${v.review
          ? `<span class="ftag ${v.review.decision === "waived" ? "draft" : ""}">${esc(t(v.review.decision === "waived" ? "gd_acl_waived" : "gd_acl_confirmed"))}</span>`
          : `<button class="btn ghost bsm" data-acl="confirmed" data-node="${v.node}">${t("gd_acl_confirm")}</button>
             <button class="btn ghost bsm" data-acl="waived" data-node="${v.node}">${t("gd_acl_waive")}</button>`}
      </div>`).join("");
    html = `${head}${rows ? `<div class="flist" style="margin-top:6px">${rows}</div>` : ""}
      <div class="actions"><button class="btn ghost" id="gdAclCheck">↻ ${t("gd_acl_check")}</button></div>`;
  }
  root.innerHTML = html;
  const check = $("#gdAclCheck"); if (check) check.onclick = loadAcl;
  root.querySelectorAll("button[data-acl]").forEach((b) => {
    b.onclick = async () => {
      b.disabled = true;
      try {
        await jf("/api/gdrive/access-conformance/resolve", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ node: Number(b.getAttribute("data-node")), decision: b.getAttribute("data-acl") }),
        });
        const v = GD.acl.report.violations.find((x) => x.node === Number(b.getAttribute("data-node")));
        if (v) v.review = { decision: b.getAttribute("data-acl"), reviewer: null, note: null };
      } catch (e) {
        GD.acl = { state: "error", error: e.message };
      }
      renderAcl();
    };
  });
}

async function loadAcl() {
  const scope = gdCurrentScope();
  if (!scope) { GD.acl = { state: "error", error: t("gd_folder_invalid") }; renderAcl(); return; }
  GD.acl = { state: "loading" };
  renderAcl();
  try {
    const report = await jf("/api/gdrive/access-conformance?scope=" + encodeURIComponent(scope));
    GD.acl = { state: "loaded", report };
  } catch (e) {
    GD.acl = { state: "error", error: e.message };
  }
  renderAcl();
}

async function readSelected() {
  const ids = [...GD.sel];
  if (!ids.length || (GD.extract && GD.extract.running)) return;
  GD.extract = { running: true, count: ids.length, results: null, error: null };
  renderFunnel();
  try {
    const r = await jf("/api/gdrive/extract", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ scope: GD.funnel.scope, fileIds: ids }),
    });
    GD.extract = { running: false, count: ids.length, results: r.results, error: null };
  } catch (e) {
    GD.extract = { running: false, count: ids.length, results: null, error: e.message };
  }
  renderFunnel();
}

async function gdPollStatus() {
  try {
    const prev = GD.poll?.running;
    GD.poll = await jf("/api/gdrive/poll/status");
    if (GD.poll.running) { if (!gdPollTimer) gdPollTimer = setInterval(gdPollStatus, 4000); }
    else if (gdPollTimer) { clearInterval(gdPollTimer); gdPollTimer = null; }
    if (GD.poll.running !== prev) renderGdrive();
    else if (GD.poll.running) { // refresh the counter line in place
      const ps = $("#gdPollstat");
      if (ps) { ps.hidden = false; ps.innerHTML = `<span class="dot"></span> ${gdStreamLine()}`; }
    }
  } catch { /* transient poll-status failure: keep the last known state */ }
}

async function refreshGdrive() {
  try {
    const s = await jf("/api/gdrive/status");
    if (!s.connected) { GD.state = "disconnected"; renderGdrive(); return; }
    GD.state = "connected";
    GD.scopes = null; GD.scopesError = null;
    try { GD.scopes = (await jf("/api/gdrive/scopes")).scopes; }
    catch (e) { GD.scopesError = e.status === 401 ? t("err_unauthorized") : e.message; }
    await gdPollStatus();
    renderGdrive();
  } catch (e) {
    GD.state = "error"; GD.error = e; renderGdrive();
  }
}

// arriving from an OAuth callback (?connected=1 → Backlog, ?connected=gdrive → Drive): confirm and clean the URL
{
  const connectedParam = new URLSearchParams(location.search).get("connected");
  if (connectedParam) {
    if (connectedParam === "gdrive") $("#oauthDone").setAttribute("data-i18n", "oauth_done_gdrive");
    $("#oauthDone").hidden = false;
    history.replaceState(null, "", location.pathname);
  }
}

applyTheme();
setLang(LANG);
refreshStatus();
refresh();
refreshGdrive();
</script>
</body>
</html>
